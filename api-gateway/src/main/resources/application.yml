server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - JwtAuthFilter
      routes:

        # Auth Service routes
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**,/oauth2/**,/login/oauth2/**

        # Measurement Service routes
        - id: measurement-service
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/quantities/compare,/api/v1/quantities/convert,/api/v1/quantities/add,/api/v1/quantities/subtract,/api/v1/quantities/divide

        # History Service routes
        - id: history-service
          uri: ${HISTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/quantities/history/**,/api/v1/quantities/count/**
